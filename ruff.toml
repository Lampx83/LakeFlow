# Ruff config for CI & dev (backend + frontend)
# Run: ruff check . or ruff check backend/src frontend/streamlit

target-version = "py310"
line-length = 100

exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  ".ruff_cache",
  "backend/.venv",
  "frontend/.venv",
]

[lint]
select = ["E", "F", "I", "N", "W"]
ignore = [
  "E501",   # line too long (let formatter or black handle)
  "ANN",    # type hints (enable when types standardized)
]

[lint.isort]
known-first-party = ["lakeflow"]

# Scripts call load_dotenv() before importing lakeflow - E402 accepted
[lint.per-file-ignores]
"backend/src/lakeflow/scripts/*.py" = ["E402"]
