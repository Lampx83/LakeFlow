# Override for deploy to server (run with docker-compose.yml)
# Example: docker compose -f docker-compose.yml -f docker-compose.deploy.yml up -d --build
# Base compose includes Ollama; backend uses LLM_BASE_URL=http://ollama:11434.
#
# Data lake path (no sudo):
#   Default: LAKEFLOW_DATA_PATH=$REPO_DIR/data (set in deploy workflow)
#   Server custom: export LAKEFLOW_DATA_PATH=/datalake/research (create dir with sudo once, then deploy user needs rwx)
#
# Qdrant: default uses named volume (data in /var/lib/docker/volumes/..., persists when down).
#   To save to fixed directory: export QDRANT_DATA_PATH=/datalake/qdrant, create dir then deploy.
#
# - Backend: remove source mount, remove --reload
# - Frontend: remove mount ./backend

services:
  lakeflow-backend:
    volumes:
      - lakeflow_data:/data
    command: uvicorn lakeflow.main:app --host 0.0.0.0 --port 8011
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  lakeflow-frontend:
    volumes:
      - lakeflow_data:/data

# Bind volume to LAKEFLOW_DATA_PATH (default: repo/data, no sudo) or set on server for e.g. /datalake/research
# Qdrant: still uses named volume from docker-compose.yml (data persists when down). To bind host: add override qdrant_data with device: /datalake/qdrant.
volumes:
  lakeflow_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${LAKEFLOW_DATA_PATH:-./data} 