# Build and push LakeFlow (backend + frontend) to Docker Hub.
# Trigger: push to main or run manually (Actions → Push LakeFlow to Docker Hub → Run workflow).
#
# Secrets: DOCKERHUB_USER, DOCKERHUB_TOKEN

name: Push LakeFlow to Docker Hub

on:
  push:
    branches: ['main']
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/push-dockerhub.yml'
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/lakeflow-backend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend/streamlit
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/lakeflow-frontend:latest
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
