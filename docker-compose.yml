# Ollama container riêng (vd tên container: ollama — xem docker ps):
#   1) Khởi động stack: docker compose up -d
#   2) Nối Ollama vào cùng network:  docker network connect lakeflow-neu-net ollama
#   3) Backend đã mặc định LLM_BASE_URL=http://ollama:11434 → resolve theo tên container.
# Không muốn nối network: trong .env đặt LLM_BASE_URL=http://host.docker.internal:11434
# (Ollama đã publish 11434 ra host; backend có extra_hosts host.docker.internal).
# Lưu ý: không dùng subnet cố định cho neu-net — tránh lỗi "Pool overlaps" khi máy nhiều stack Docker.
services:
  # =========================
  # Vector Database
  # =========================
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: lakeflow-qdrant
    ports:
      - "8013:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - neu-net

  # =========================
  # Backend API + Pipelines
  # =========================
  lakeflow-backend:
    build:
      context: ./backend
    container_name: lakeflow-backend
    depends_on:
      - qdrant
    ports:
      - "8011:8011"
    # Linux: host.docker.internal not available by default, extra_hosts needed to resolve
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      LAKE_ROOT: /data
      QDRANT_HOST: lakeflow-qdrant
      QDRANT_PORT: "6333"
      # Cùng server Docker: Ollama lắng nghe 11434, hostname = tên service/container trên chung network
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
    volumes:
      - lakeflow_data:/data
      - ./backend/src:/app/src
    command: uvicorn lakeflow.main:app --host 0.0.0.0 --port 8011 --reload
    restart: unless-stopped
    networks:
      - neu-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s

  # =========================
  # Streamlit Frontend
  # =========================
  lakeflow-frontend:
    build:
      context: ./frontend/streamlit
    container_name: lakeflow-frontend

    depends_on:
      - lakeflow-backend

    env_file:
      - .env
    environment:
      API_BASE_URL: http://lakeflow-backend:8011
    ports:
      - "8012:8012"

    volumes:
      - ./frontend/streamlit:/app
      - ./backend:/app/backend
      - lakeflow_data:/data

    # wait for backend ready before running streamlit (use Python because image has no curl)
    command: >
      sh -c "
      echo 'Waiting backend...';
      until python -c \"import urllib.request; urllib.request.urlopen('http://lakeflow-backend:8011/health')\" 2>/dev/null; do
        sleep 2;
      done;
      echo 'Backend ready, starting Streamlit...';
      streamlit run app.py --server.port 8012 --server.address 0.0.0.0
      "

    restart: unless-stopped
    networks:
      - neu-net


# =========================
# Volumes
# =========================
volumes:
  lakeflow_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${HOST_LAKE_PATH}"

  qdrant_data:
networks:
  neu-net:
    name: lakeflow-neu-net
    driver: bridge